<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BhandsMusic</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:transparent;user-select:none}
  .overlay{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .dialog{width:370px;background:rgba(18,19,24,.92);border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.55),0 0 40px rgba(244,210,138,.04);padding:28px 26px 22px;position:relative;backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4)}
  .dialog-title{font-size:17px;font-weight:700;color:rgba(255,255,255,.94);margin-bottom:6px;letter-spacing:.2px}
  .dialog-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-size:16px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .18s}
  .dialog-close:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.16);color:rgba(255,255,255,.8)}
  .dialog-desc{font-size:12.5px;color:rgba(255,255,255,.42);margin-bottom:20px;letter-spacing:.15px}
  .remember-row{display:flex;align-items:center;gap:9px;margin-bottom:24px}
  .remember-row input[type=checkbox]{width:15px;height:15px;accent-color:#f4d28a;cursor:pointer;filter:saturate(.6)}
  .remember-row label{font-size:12.5px;color:rgba(255,255,255,.48);cursor:pointer;letter-spacing:.1px}
  .dialog-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px}
  .dialog-btn{height:36px;padding:0 20px;border-radius:18px;border:1px solid transparent;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.15px}
  .btn-cancel{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.52)}
  .btn-cancel:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16);color:rgba(255,255,255,.78)}
  .btn-exit{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.52)}
  .btn-exit:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16);color:rgba(255,255,255,.78)}
  .btn-minimize{background:linear-gradient(135deg,color-mix(in srgb,#f4d28a 88%,#fff),color-mix(in srgb,#f4d28a 65%,#c9963d));border-color:rgba(244,210,138,.44);color:#1a1200}
  .btn-minimize:hover{box-shadow:0 8px 28px rgba(244,210,138,.22),inset 0 1px 0 rgba(255,255,255,.2);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dialog-title">关闭应用</div>
    <button class="dialog-close" id="close-x">&times;</button>
    <div class="dialog-desc">请选择关闭方式</div>
    <div class="remember-row">
      <input type="checkbox" id="remember">
      <label for="remember">记住我的选择</label>
    </div>
    <div class="dialog-actions">
      <button class="dialog-btn btn-cancel" data-action="cancel">取消</button>
      <button class="dialog-btn btn-exit" data-action="exit">退出应用</button>
      <button class="dialog-btn btn-minimize" data-action="minimize">最小化到托盘</button>
    </div>
  </div>
</div>
<script>
  const { ipcRenderer } = require('electron');
  function send(action) {
    const remember = document.getElementById('remember').checked;
    ipcRenderer.send('close-dialog-action', { action, remember });
  }
  document.querySelectorAll('.dialog-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { send(btn.dataset.action); });
  });
  document.getElementById('close-x').addEventListener('click', function() { send('cancel'); });
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) send('cancel');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') send('cancel');
  });
</script>
</body>
</html>
