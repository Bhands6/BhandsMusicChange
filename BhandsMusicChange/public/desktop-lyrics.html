<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BhandsMusic Desktop Lyrics</title>
  <style>
    /* ==================== CSS 变量定义 ==================== */
    /* 定义歌词样式相关的 CSS 自定义属性 */
    :root{
      --lyric-primary:#f6fdff;        /* 主要文字颜色 - 亮白色 */
      --lyric-secondary:#a8f6ff;      /* 次要文字颜色 - 浅青色 */
      --lyric-highlight:#fff0b8;      /* 高亮文字颜色 - 暖黄色 */
      --lyric-glow:#9cffdf;           /* 发光效果颜色 - 青绿色 */
      --lyric-font:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif; /* 字体栈 */
      --lyric-weight:900;             /* 字体粗细 */
      --lyric-letter-spacing:0px;     /* 字间距 */
      --lyric-line-height:1;          /* 行高 */
      --lyric-size:58px;              /* 字体大小 */
      --lyric-progress:0%;            /* 歌词进度百分比 */
      --lyric-feather:5.5%;           /* 渐变羽化宽度 */
      --lyric-fit-x:1;               /* 水平缩放比例 */
      --lyric-scroll-x:0px;          /* 水平滚动偏移量 */
      --lyric-edge-width:92px;        /* 边缘宽度 */
      --lyric-mask-edge-width:92px;   /* 遮罩边缘宽度 */
      --lyric-vertical-feather:46px;  /* 垂直羽化距离 */
      --lyric-css-beat-glow:0px;     /* 节拍发光大小 */
      --lyric-shadow-soft:rgba(156,255,223,.34);  /* 柔和阴影 */
      --lyric-shadow-glow:rgba(156,255,223,.26);  /* 发光阴影 */
      --lyric-shadow-hot:rgba(255,240,184,.22);   /* 高亮阴影 */
      --lyric-edge:rgba(4,6,12,.42);              /* 边缘颜色 */
      --lyric-drop:rgba(156,255,223,.38);         /* 投影颜色 */
      --lyric-drop-paused:rgba(156,255,223,.22);  /* 暂停时投影颜色 */
    }
    /* ==================== 基础布局样式 ==================== */
    /* 页面基础样式 - 全屏透明背景，禁止文本选择 */
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;user-select:none}
    /* body 默认隐藏，通过 .show 类显示，支持窗口拖拽 */
    body{opacity:0;transition:opacity .22s ease;-webkit-app-region:no-drag}
    body.show{opacity:1}  /* 显示状态 */
    canvas{display:none}  /* 隐藏 canvas 元素，用于粒子效果绘制 */
    /* ==================== 歌词容器布局 ==================== */
    /* 外层包裹容器 - 全屏居中对齐，禁用鼠标事件 */
    .wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 12px;pointer-events:none}
    /* 舞台容器 - 歌词显示区域，支持 3D 变换和动画 */
    .stage{
      position:relative;
      max-width:calc(100vw - 24px);
      padding:104px 86px 94px;  /* 内边距，为锁定提示留空间 */
      box-sizing:border-box;
      pointer-events:auto;      /* 启用鼠标事件 */
      cursor:default;
      transform-style:preserve-3d;  /* 保留 3D 变换 */
      transform-origin:center;
      will-change:transform,filter; /* 优化动画性能 */
      contain:layout style;         /* 限制重绘范围 */
      backface-visibility:hidden;
      -webkit-app-region:no-drag;   /* 禁止窗口拖拽 */
    }
    /* 解锁状态下显示移动光标 */
    body.unlocked .stage{cursor:move}
    body.unlocked .stage.hint-visible{cursor:move;-webkit-app-region:no-drag}
    /* 歌词视口 - 承载歌词文本，带渐变遮罩效果 */
    .lyric-viewport{
      position:relative;
      z-index:2;
      display:block;
      width:min(100%,1120px);
      max-width:calc(100vw - 24px);
      margin:0 auto;
      padding:1.24em var(--lyric-edge-width) 1.34em;
      box-sizing:border-box;
      overflow:hidden;
      text-align:center;
      pointer-events:none;
      isolation:isolate;
      /* 水平渐变遮罩 - 边缘淡出效果 */
      -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 var(--lyric-mask-edge-width),#000 calc(100% - var(--lyric-mask-edge-width)),transparent 100%);
      mask-image:linear-gradient(90deg,transparent 0,#000 var(--lyric-mask-edge-width),#000 calc(100% - var(--lyric-mask-edge-width)),transparent 100%);
      filter:drop-shadow(0 1px 2.4px rgba(4,6,12,.58)) drop-shadow(0 0 4.8px rgba(4,6,12,.30));
      transform:translateZ(0);  /* 启用硬件加速 */
      will-change:transform,filter;
    }
    /* 解锁且提示可见时启用视口鼠标事件 */
    body.unlocked .stage.hint-visible .lyric-viewport{pointer-events:auto;cursor:move;-webkit-app-region:no-drag}
    /* ==================== 歌词滚动和文本样式 ==================== */
    /* 歌词滚动容器 - 支持平滑滚动动画 */
    .lyric-scroll{
      display:inline-block;
      transform:translate3d(var(--lyric-scroll-x),0,0) scaleX(var(--lyric-fit-x));
      transform-origin:center;
      will-change:transform;
      backface-visibility:hidden;
    }
    /* 歌词文本行 - 核心样式，支持渐变填充和发光效果 */
    .line{
      position:relative;
      z-index:2;
      display:inline-block;
      max-width:none;
      color:#fff;
      font-family:var(--lyric-font);
      font-size:var(--lyric-size);
      font-weight:var(--lyric-weight);
      line-height:var(--lyric-line-height);
      letter-spacing:var(--lyric-letter-spacing);
      text-align:center;
      white-space:nowrap;
      overflow:visible;
      text-overflow:clip;
      padding:.20em .12em .34em;
      margin:-.20em -.12em -.34em;
      /* 文本渐变填充 - 使用 background-clip 实现文字渐变 */
      background:linear-gradient(90deg,var(--lyric-primary),var(--lyric-primary));
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      -webkit-text-stroke:.18px rgba(255,255,255,.72);  /* 文字描边 */
      paint-order:stroke fill;
      /* 多层文字阴影 - 创建发光效果 */
      text-shadow:0 0 1px rgba(255,255,255,.34),0 0 calc(6px + var(--lyric-css-beat-glow)) var(--lyric-shadow-soft),0 0 calc(14px + var(--lyric-css-beat-glow)) var(--lyric-shadow-glow);
      filter:none;
      opacity:0;  /* 初始隐藏，通过动画显示 */
      transform:translate3d(0,0,0);
      transform-origin:center;
      backface-visibility:hidden;
      will-change:opacity,filter,transform,background;
    }
    /* 高亮模式 - 歌词进度渐变效果 */
    body.highlight .line{
      background:linear-gradient(90deg,
        var(--lyric-highlight) 0%,
        var(--lyric-highlight) max(0%,calc(var(--lyric-progress) - var(--lyric-feather))),
        var(--lyric-glow) calc(var(--lyric-progress) + 1.2%),
        var(--lyric-primary) calc(var(--lyric-progress) + var(--lyric-feather)),
        var(--lyric-primary) 100%);
      -webkit-background-clip:text;
      background-clip:text;
    }
    /* 歌词入场动画 - 使用 .in 类触发 */
    .line.in{animation:lyr-in 820ms cubic-bezier(.16,.84,.32,1.02) forwards}
    /* 暂停状态 - 降低透明度 */
    body.paused .line{filter:none;opacity:.84}
    /* ==================== 锁定提示和控制按钮 ==================== */
    /* 锁定状态提示 - 显示在歌词上方，包含锁定图标和文字 */
    .lock-hint{
      position:absolute;
      z-index:4;
      left:50%;
      top:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      min-width:92px;
      min-height:30px;
      padding:0 11px;
      border-radius:999px;  /* 圆角药丸形状 */
      border:1px solid color-mix(in srgb,var(--lyric-glow) 58%,rgba(255,255,255,.36));
      background:rgba(4,6,10,.44);  /* 半透明深色背景 */
      color:rgba(255,255,255,.84);
      font:800 12px/1 "Microsoft YaHei",sans-serif;
      text-shadow:0 1px 10px rgba(0,0,0,.55);
      box-shadow:0 0 20px color-mix(in srgb,var(--lyric-glow) 30%,transparent),inset 0 1px 0 rgba(255,255,255,.16);
      opacity:0;  /* 初始隐藏 */
      pointer-events:none;
      transform:translateX(-50%) translateY(-8px) scale(.92);  /* 初始位置偏移和缩小 */
      transition:opacity .16s ease,transform .16s ease;
      -webkit-app-region:no-drag;
    }
    /* 锁图标 - 使用伪元素绘制 */
    .lock-icon{
      position:relative;
      width:13px;
      height:13px;
      flex:0 0 auto;
    }
    /* 锁体 - 矩形部分 */
    .lock-icon::before{content:"";position:absolute;left:2px;bottom:1px;width:9px;height:7px;border:1.7px solid var(--lyric-highlight);border-radius:2px;box-sizing:border-box}
    /* 锁环 - 弧形部分 */
    .lock-icon::after{content:"";position:absolute;left:3px;top:0;width:7px;height:8px;border:1.7px solid var(--lyric-highlight);border-bottom:0;border-radius:7px 7px 0 0;box-sizing:border-box}
    /* 解锁状态 - 锁环旋转 */
    body.unlocked .lock-icon::after{left:7px;transform:rotate(24deg);transform-origin:left bottom}
    /* 关闭按钮 - 仅在解锁状态下显示 */
    .lyrics-close{
      display:none;
      align-items:center;
      justify-content:center;
      height:22px;
      width:auto;
      margin-right:-4px;
      border:0;
      border-left:1px solid rgba(255,255,255,.14);  /* 左侧分隔线 */
      padding:0 0 1px 9px;
      background:transparent;
      color:rgba(255,255,255,.82);
      font:800 12px/1 "Microsoft YaHei",sans-serif;
      cursor:pointer;
      text-shadow:0 0 12px var(--lyric-primary);
      -webkit-app-region:no-drag;
    }
    .lyrics-close:hover{color:#fff}  /* 悬停时变亮 */
    body.unlocked .lyrics-close{display:flex}  /* 解锁时显示关闭按钮 */
    /* 解锁且提示可见时启用锁定提示鼠标事件 */
    body.unlocked .stage.hint-visible .lock-hint{pointer-events:auto;-webkit-app-region:no-drag}
    /* 提示可见时显示锁定提示 */
    .stage.hint-visible .lock-hint{opacity:.94;transform:translateX(-50%) translateY(0) scale(1)}
    /* ==================== 动画关键帧 ==================== */
    /* 歌词入场动画 - 从下方飞入，带 3D 旋转和模糊效果 */
    @keyframes lyr-in{
      0%{opacity:0;transform:translate3d(0,32px,-120px) rotateX(24deg) rotateY(-18deg) scale(.78);filter:blur(12px)}
      58%{opacity:1;filter:blur(0)}  /* 中间点完成透明度动画 */
      100%{opacity:1;transform:translate3d(0,0,0) rotateX(0deg) rotateY(0deg) scale(1);filter:blur(0)}
    }
  </style>
</head>
<body>
  <!-- 粒子效果画布 - 用于绘制发光粒子 -->
  <canvas id="fx"></canvas>
  <div class="wrap">
    <!-- 主舞台容器 - 歌词显示核心区域 -->
    <div id="stage" class="stage">
      <!-- 歌词视口 - 承载滚动歌词文本 -->
      <div id="lyricViewport" class="lyric-viewport">
        <div id="lyricScroller" class="lyric-scroll">
          <div id="line" class="line" data-text="BhandsMusic">BhandsMusic</div>
        </div>
      </div>
      <!-- 锁定提示 - 显示锁定/解锁状态和关闭按钮 -->
      <div id="lockHint" class="lock-hint">
        <span class="lock-icon"></span>
        <span id="lockText">&#20013;&#38190;&#35299;&#38145;</span>  <!-- "中键解锁" -->
        <button id="closeLyricsBtn" class="lyrics-close" type="button" aria-label="Close desktop lyrics">&#20851;&#38381;&#26700;&#38754;&#27468;&#35789;</button>  <!-- "关闭桌面歌词" -->
      </div>
    </div>
  </div>
  <script>
    'use strict';
    /* ==================== DOM 元素引用 ==================== */
    var canvas = document.getElementById('fx');           // 粒子效果画布
    var ctx = canvas.getContext('2d');                     // 2D 绘图上下文
    var stage = document.getElementById('stage');          // 主舞台容器
    var lyricViewport = document.getElementById('lyricViewport');  // 歌词视口
    var line = document.getElementById('line');            // 歌词文本行元素
    var lockHint = document.getElementById('lockHint');    // 锁定提示元素
    var lockText = document.getElementById('lockText');    // 锁定提示文字
    var closeLyricsBtn = document.getElementById('closeLyricsBtn');  // 关闭按钮

    /* ==================== 渲染状态变量 ==================== */
    var dpr = 1;                    // 设备像素比
    var lastText = '';              // 上一次显示的歌词文本
    var progressText = '';          // 当前进度对应的文本
    var displayedProgress = 0;      // 当前显示的进度值
    var baseFontSize = 58;          // 基础字体大小
    var renderedFontSize = 58;      // 实际渲染的字体大小
    var fitScaleX = 1;             // 水平适配缩放比例

    /* ==================== 交互状态变量 ==================== */
    var hoverCapture = false;       // 鼠标悬停捕获状态
    var dragging = false;           // 拖拽状态
    var dragPointerId = null;       // 拖拽指针 ID
    var dragLast = { x:0, y:0 };   // 上次拖拽位置
    var lastDrawAt = 0;            // 上次绘制时间戳
    var layoutKey = '';             // 布局缓存键
    var hoverInside = false;       // 鼠标是否在区域内
    var hintVisible = false;       // 提示是否可见
    var hintTimer = 0;             // 提示显示定时器
    var lastPointerEvent = null;   // 上次指针事件

    /* ==================== 滚动状态 ==================== */
    var scrollState = {
      needed:false,    // 是否需要滚动
      overflow:0,      // 溢出宽度
      limit:0,         // 滚动限制
      offset:0,        // 当前偏移量
      dir:-1,          // 滚动方向
      holdUntil:0,     // 暂停滚动截止时间
      lastAt:0         // 上次更新时间
    };

    /* ==================== 粒子系统 ==================== */
    var particles = [];  // 粒子数组

    /* ==================== 实时动画状态 ==================== */
    var live = {
      solar:0,    // 太阳光照强度
      beat:0,     // 节拍强度
      bass:0,     // 低音强度
      scale:1,    // 缩放比例
      glow:0,     // 发光强度
      spark:0,    // 火花强度
      lift:0      // 上升偏移量
    };

    /* ==================== 应用主状态 ==================== */
    var state = {
      enabled:false,           // 是否启用歌词显示
      text:'BhandsMusic',        // 当前歌词文本
      progress:0,              // 播放进度 (0-1)
      progressSpan:4.8,        // 进度更新间隔（秒）
      progressReceivedAt:0,    // 进度接收时间戳
      playing:false,           // 是否正在播放

      /* 播放状态 */
      playbackTime:0,          // 当前播放时间
      playbackDuration:0,      // 总时长
      playbackRate:1,          // 播放速率
      playbackReceivedAt:0,    // 播放状态接收时间
      beatMapKey:'',           // 节拍映射键

      /* 显示设置 */
      size:1,                  // 大小缩放因子
      opacity:.92,             // 整体透明度
      clickThrough:true,       // 是否点击穿透（锁定状态）
      lyricGlowParticles:false, // 是否显示粒子效果
      cinema:true,             // 是否启用影院模式
      highlightFollow:false,   // 高亮是否跟随进度
      frameRate:60,            // 目标帧率

      /* 发光效果设置 */
      lyricGlow:true,          // 是否启用歌词发光
      lyricGlowBeat:true,      // 发光是否跟随节拍
      lyricGlowStrength:.35,   // 发光强度
      highBloom:0,             // 高光泛光强度
      beatGlow:0,              // 节拍发光强度
      beatPulse:0,             // 节拍脉冲强度
      bass:0,                  // 低音强度
      feather:.055,            // 渐变羽化宽度

      /* 字体设置 */
      fontFamily:'Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif',
      fontWeight:900,          // 字体粗细
      letterSpacing:0,         // 字间距
      lineHeight:1,            // 行高
      lyricScale:1,            // 歌词缩放

      /* 颜色配置 */
      colors:{primary:'#f6fdff',secondary:'#a8f6ff',highlight:'#fff0b8',glow:'#9cffdf'},
      displayColors:{primary:'#f6fdff',secondary:'#a8f6ff',highlight:'#fff0b8',glow:'#9cffdf'}
    };
    /* ==================== 桌面节拍系统 ==================== */
    /* 节拍映射状态 - 用于同步音乐节拍和视觉效果 */
    var desktopBeat = {
      key:'',           // 当前节拍映射键
      map:null,         // 节拍映射数据
      camera:[],        // 镜头节拍事件数组
      pulse:[],         // 脉冲节拍事件数组
      events:[],        // 当前活跃的节拍事件
      cameraIdx:0,      // 镜头节拍索引
      pulseIdx:0,       // 脉冲节拍索引
      prevTime:-1,      // 上次更新时间
      lastTriggerAt:-10, // 上次触发时间
      pulseDrive:0,     // 脉冲驱动值
      glowDrive:0,      // 发光驱动值
      bassDrive:0,      // 低音驱动值
      lookahead:.075    // 预读取时间（秒）
    };
    /* 节拍组合类型 - 用于定义不同的节拍效果 */
    var DESKTOP_BEAT_COMBOS = ['', 'downbeat', 'push', 'drop', 'rebound', 'accent'];
    /* ==================== 工具函数 ==================== */
    /**
     * 数值钳制函数 - 将值限制在指定范围内
     * @param {number} value - 输入值
     * @param {number} min - 最小值
     * @param {number} max - 最大值
     * @param {number} fallback - 无效值时的默认值
     * @returns {number} 钳制后的值
     */
    function clamp(value, min, max, fallback) {
      var n = Number(value);
      if (!isFinite(n)) n = fallback;
      return Math.max(min, Math.min(max, n));
    }

    /**
     * 伪随机数生成器 - 基于种子生成确定性随机数
     * @param {number} seed - 随机种子
     * @returns {number} 0-1 之间的伪随机数
     */
    function rand(seed){ return Math.abs(Math.sin(seed * 9283.173) * 43758.5453) % 1; }

    /**
     * 检查是否处于锁定状态
     * @returns {boolean} 是否锁定
     */
    function isLocked(){ return state.clickThrough !== false; }

    /**
     * 设置 CSS 根变量
     * @param {string} name - 变量名
     * @param {string} value - 变量值
     */
    function setRootVar(name, value){ document.documentElement.style.setProperty(name, value); }

    /* 颜色解析上下文 - 用于解析 CSS 颜色值 */
    var colorCtx = document.createElement('canvas').getContext('2d');

    /**
     * 解析 CSS 颜色字符串为 RGBA 对象
     * @param {string} color - CSS 颜色字符串
     * @param {string} fallback - 默认颜色
     * @returns {object} {r, g, b, a} 颜色对象
     */
    function parseCssColor(color, fallback) {
      fallback = fallback || '#ffffff';
      try {
        colorCtx.fillStyle = fallback;
        var safe = colorCtx.fillStyle;
        colorCtx.fillStyle = String(color || fallback);
        var css = colorCtx.fillStyle || safe;
        /* 解析十六进制颜色 */
        var hex = css.match(/^#([0-9a-f]{6})$/i);
        if (hex) {
          var n = parseInt(hex[1], 16);
          return { r:(n >> 16) & 255, g:(n >> 8) & 255, b:n & 255, a:1 };
        }
        /* 解析 RGB/RGBA 颜色 */
        var rgb = css.match(/^rgba?\(\s*([.\d]+)\s*,\s*([.\d]+)\s*,\s*([.\d]+)(?:\s*,\s*([.\d]+))?/i);
        if (rgb) return { r:Math.round(rgb[1]), g:Math.round(rgb[2]), b:Math.round(rgb[3]), a:rgb[4] == null ? 1 : clamp(rgb[4], 0, 1, 1) };
      } catch (e) {}
      return { r:255, g:255, b:255, a:1 };  /* 默认白色 */
    }
    /**
     * 提升歌词颜色亮度 - 确保颜色在暗背景下可见
     * @param {string} color - 原始颜色
     * @param {string} fallback - 默认颜色
     * @param {number} minLum - 最小亮度值 (0-1)
     * @returns {string} RGB 颜色字符串
     */
    function liftedLyricColor(color, fallback, minLum) {
      var c = parseCssColor(color, fallback);
      /* 计算感知亮度 (ITU-R BT.601) */
      var lum = (c.r * 0.299 + c.g * 0.587 + c.b * 0.114) / 255;
      var floor = minLum == null ? .34 : minLum;
      /* 如果亮度过低，提升 RGB 值 */
      if (lum < floor) {
        var lift = Math.round((floor - lum) * 255);
        c.r = Math.min(255, c.r + lift);
        c.g = Math.min(255, c.g + lift);

      var y = rect.top + rect.height * .50 - live.lift * .10;
      var rx = Math.max(42, Math.min(150, renderedFontSize * (1.05 + live.beat * .32)));
      var ry = Math.max(24, Math.min(82, renderedFontSize * (.42 + live.beat * .18)));
      var alpha = clamp(.18 + live.solar * .12 + live.beat * .18, .12, .48) * clamp(state.opacity, .28, 1, .92);

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.scale(rx, ry);

      /* 创建径向渐变 */
      var g = ctx.createRadialGradient(0,0,0,0,0,1);
      g.addColorStop(0, colorWithAlpha(state.displayColors.highlight, .88));
      g.addColorStop(.36, colorWithAlpha(state.displayColors.glow, .34));
      g.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0,0,1,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    /**
     * 绘制发光文字 - 多层模糊叠加
     * @param {object} rect - 歌词区域矩形
     * @param {object} motion - 运动参数
     */
    function drawGlowText(rect, motion) {
      if (!state.lyricGlow || motion.glowStrength <= 0) return;

      /* 计算发光强度 */
      var target = Math.min(1.08, (0.09 + live.solar * .38 + live.beat * .22) * Math.min(3, motion.glowDrive));
      live.glow += (target - live.glow) * (target > live.glow ? .11 : .06);
      if (live.glow <= .004) return;

      var text = line.textContent || 'BhandsMusic';
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var spacing = renderedFontSize * state.letterSpacing;

      /* 根据热度选择颜色 */
      var hotMix = Math.max(0, Math.min(1, live.solar * 1.05 + live.beat * .18));
      var color = hotMix > .42 ? state.displayColors.highlight : state.displayColors.glow;

      /* 定义发光层 - 从内到外 */
      var layers = [
        { blur:10, alpha:.54, stroke:Math.max(9, renderedFontSize * .09) },   // 内层
        { blur:24, alpha:.38, stroke:Math.max(15, renderedFontSize * .15) },   // 中层
        { blur:48, alpha:.20, stroke:Math.max(22, renderedFontSize * .22) },   // 外层
        { blur:78, alpha:.09, stroke:Math.max(30, renderedFontSize * .30) }    // 最外层
      ];

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = state.fontWeight + ' ' + renderedFontSize + 'px ' + state.fontFamily;
      ctx.translate(cx, cy);
      ctx.scale(fitScaleX * live.scale, live.scale);

      /* 绘制每一层 */
      for (var i = 0; i < layers.length; i++) {
        ctx.save();
        ctx.filter = 'blur(' + layers[i].blur + 'px)';
        ctx.globalAlpha = live.glow * layers[i].alpha * clamp(state.opacity, .28, 1, .92);
        ctx.fillStyle = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = layers[i].stroke;
        ctx.lineJoin = 'round';
        /* 绘制描边和填充 */
        drawCanvasText(text, 0, 0, renderedFontSize, spacing, true);   // 描边
        drawCanvasText(text, 0, 0, renderedFontSize, spacing, false);  // 填充
        ctx.restore();
      }
      ctx.restore();
    }

    /**
     * 绘制粒子效果
     * @param {object} rect - 歌词区域矩形
     * @param {object} motion - 运动参数
     * @param {number} now - 当前时间（秒）
     */
    function drawParticles(rect, motion, now) {
      /* 计算粒子强度 */
      var target = state.lyricGlow && state.lyricGlowParticles ? Math.min(.50, (.12 + live.solar * .18 + live.beat * .16) * Math.min(1.7, motion.glowDrive)) : 0;
      live.spark += (target - live.spark) * (target > live.spark ? .14 : .08);
      if (live.spark <= .006) return;

      ensureParticles();

      /* 计算粒子区域 */
      var width = Math.max(300, Math.min(innerWidth - 48, rect.width * 1.16 + 140));
      var height = Math.max(74, rect.height * 1.34);
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2 + Math.sin(now * .55) * 3.5;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      /* 绘制每个粒子 */
      for (var i=0;i<particles.length;i++) {
        var p = particles[i];
        var lane = Math.floor(p.lane * 5);       // 轨道
        var local = (p.lane * 5) % 1;             // 轨道内位置
        var speed = .018 + rand(p.seed) * .030 + lane * .002;  // 速度
        var flow = (p.phase + now * speed) % 1;   // 流动位置
        var edge = Math.sin(Math.PI * flow);      // 边缘因子

        /* 计算粒子位置 */
        var x = cx + (flow - .5) * width * (1.02 + rand(p.seed * 4.1) * .18);
        var curve = Math.sin(flow * Math.PI * 2 * (.9 + rand(p.seed * 1.3) * .5) + p.seed + now * .32);
        var y = cy + (lane - 2) * height * .13 + curve * height * (.16 + rand(p.seed * 2.2) * .18) + (local - .5) * height * .13 + Math.sin(now * (.42 + rand(p.seed) * .32) + p.seed) * (4 + live.beat * 6);

        /* 计算粒子大小和闪烁 */
        var tw = Math.pow(.5 + .5 * Math.sin(now * (.7 + rand(p.seed) * .4) + p.seed), 4);
        var r = Math.max(.7, p.size * (.75 + edge * 1.45 + tw * .85 + live.beat * .55));

        /* 创建粒子渐变 */
        var grad = ctx.createRadialGradient(x,y,0,x,y,r*4.5);
        grad.addColorStop(0, colorWithAlpha(state.displayColors.highlight, .96));
        grad.addColorStop(.34, colorWithAlpha(state.displayColors.glow, .68));
        grad.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.globalAlpha = live.spark * (0.16 + edge * .44 + tw * .24) * clamp(state.opacity, .28, 1, .92);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x,y,r*4.5,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    /* ==================== 主绘制循环 ==================== */
    /**
     * 主绘制函数 - 每帧调用
     * @param {number} nowMs - 当前时间戳（毫秒）
     */
    function draw(nowMs){
      /* 帧率限制 */
      if (state.enabled) {
        var interval = frameIntervalMs();
        if (interval > 0 && lastDrawAt && nowMs - lastDrawAt < Math.max(4, interval - 1.25)) {
          scheduleNextDraw();
          return;
        }
      }

      /* 计算时间增量 */
      var dt = lastDrawAt ? Math.min(.12, Math.max(.001, (nowMs - lastDrawAt) / 1000)) : 1 / 60;
      lastDrawAt = nowMs;
      var now = nowMs * .001;  // 转换为秒

      if (state.enabled) {
        /* 更新进度 */
        var progress = currentDisplayProgress();
        setRootVar('--lyric-progress', (progress * 100).toFixed(2) + '%');

        /* 更新节拍和运动 */
        var offlineMotion = tickDesktopBeatMap(currentDesktopPlaybackTime(nowMs), dt);
        var motion = updateMotion(now, offlineMotion);
        applyStageMotion(now);
        updateLyricScroll(nowMs, progress);
      }

      scheduleNextDraw();
    }

    /**
     * 调度下一次绘制
     */
    function scheduleNextDraw() {
      if (!state.enabled) {
        /* 禁用时降低刷新率 */
        setTimeout(function(){ requestAnimationFrame(draw); }, 250);
        return;
      }
      requestAnimationFrame(draw);
    }

    /* ==================== 帧率控制 ==================== */
    /**
     * 标准化帧率值
     * @param {number} value - 原始帧率
     * @returns {number} 标准化后的帧率
     */
    function normalizeFrameRate(value) {
      var n = Number(value);
      if (!isFinite(n) || n <= 0) return 0;
      if (n <= 26) return 24;
      if (n <= 45) return 30;
      if (n <= 90) return 60;
      return 120;
    }

    /**
     * 计算帧间隔（毫秒）
     * @returns {number} 帧间隔
     */
    function frameIntervalMs() {
      var fps = normalizeFrameRate(state.frameRate);
      return fps > 0 ? 1000 / fps : 0;
    }

    /* ==================== 碰撞检测函数 ==================== */
    /**
     * 检测点是否在矩形内（带内边距）
     * @param {object} evt - 鼠标事件
     * @param {object} rect - 矩形区域
     * @param {number} padX - 水平内边距
     * @param {number} padY - 垂直内边距
     * @returns {boolean} 是否在区域内
     */
    function pointInRect(evt, rect, padX, padY) {
      return evt.clientX >= rect.left - padX && evt.clientX <= rect.right + padX && evt.clientY >= rect.top - padY && evt.clientY <= rect.bottom + padY;
    }

    /**
     * 检测点是否在舞台内
     * @param {object} evt - 鼠标事件
     * @returns {boolean} 是否在舞台内
     */
    function pointInStage(evt) {
      if (!state.enabled || !evt) return false;
      if (dragging) return true;  // 拖拽中始终认为在内部

      /* 解锁状态 - 整个舞台区域 */
      if (!isLocked()) {
        var stageRect = stage.getBoundingClientRect();
        return pointInRect(evt, stageRect, 0, 0);
      }

      /* 锁定状态 - 歌词区域和提示区域 */
      var padX = Math.max(24, Math.min(68, innerWidth * .034));
      var padY = Math.max(22, Math.min(46, innerHeight * .045));
      var lyricRect = lyricViewport.getBoundingClientRect();
      if (pointInRect(evt, lyricRect, padX, padY)) return true;
      var hintRect = lockHint.getBoundingClientRect();
      return pointInRect(evt, hintRect, 10, 10);
    }

    /* ==================== 交互提示函数 ==================== */
    /**
     * 设置提示可见性
     * @param {boolean} visible - 是否可见
     */
    function setHintVisible(visible) {
      hintVisible = !!visible;
      stage.classList.toggle('hint-visible', hintVisible);
      setPointerCapture(!isLocked() && (hintVisible || dragging) && hoverInside);
    }

    /**
     * 隐藏交互提示
     */
    function hideInteractionHint() {
      hoverInside = false;
      lastPointerEvent = null;
      if (hintTimer) {
        clearTimeout(hintTimer);
        hintTimer = 0;
      }
      setHintVisible(false);
      stage.classList.remove('hover');
    }

    /**
     * 延迟显示交互提示
     */
    function scheduleInteractionHint() {
      if (hintVisible || hintTimer) return;
      hintTimer = setTimeout(function(){
        hintTimer = 0;
        if (!hoverInside || !lastPointerEvent || !pointInStage(lastPointerEvent)) return;
        setHintVisible(true);
      }, 1500);  // 1.5 秒延迟
    }

    /* ==================== 鼠标悬停处理 ==================== */
    /**
     * 更新悬停状态
     * @param {object} evt - 鼠标事件
     * @returns {boolean} 是否在区域内
     */
    function updateHover(evt) {
      var inside = !!state.enabled && pointInStage(evt);
      hoverInside = inside;
      lastPointerEvent = evt || lastPointerEvent;
      stage.classList.toggle('hover', inside || dragging);

      /* 锁定状态处理 */
      if (isLocked()) {
        if (inside || dragging) {
          scheduleInteractionHint();
        } else {
          hideInteractionHint();
        }
        setPointerCapture(false);
        return inside;
      }

      /* 解锁状态处理 */
      if (inside || dragging) {
        scheduleInteractionHint();
      } else {
        hideInteractionHint();
      }
      setPointerCapture(inside || dragging);
      return inside;
    }

    /* ==================== 锁定控制 ==================== */
    /**
     * 设置锁定状态
     * @param {boolean} locked - 是否锁定
     */
    function setLocked(locked) {
      state.clickThrough = !!locked;
      syncLockClasses();
      /* 通知桌面覆盖层 */
      if (window.desktopOverlay && window.desktopOverlay.setLyricsLockState) {
        window.desktopOverlay.setLyricsLockState(!!locked).catch(function(){});
      }
    }

    /* ==================== 拖拽处理 ==================== */
    /**
     * 处理拖拽移动
     * @param {object} evt - 指针事件
     */
    function moveDrag(evt) {
      if (dragging && !isLocked() && window.desktopOverlay && window.desktopOverlay.moveLyricsBy) {
        var dx = evt.screenX - dragLast.x;
        var dy = evt.screenY - dragLast.y;
        dragLast.x = evt.screenX;
        dragLast.y = evt.screenY;
        if (dx || dy) window.desktopOverlay.moveLyricsBy(dx, dy).catch(function(){});
      }
    }

    /**
     * 结束拖拽
     * @param {object} evt - 指针事件
     */
    function endDrag(evt) {
      if (!dragging) return;
      /* 验证指针 ID */
      if (evt && dragPointerId != null && evt.pointerId != null && evt.pointerId !== dragPointerId) return;
      try {
        /* 释放指针捕获 */
        if (dragPointerId != null && stage.releasePointerCapture && stage.hasPointerCapture && stage.hasPointerCapture(dragPointerId)) {
          stage.releasePointerCapture(dragPointerId);
        }
      } catch (e) {}
      dragging = false;
      dragPointerId = null;
      setPointerCapture(false);
    }
    /* ==================== 事件监听器 ==================== */
    /* 指针移动事件 - 处理拖拽和悬停 */
    window.addEventListener('pointermove', function(evt){
      /* 检测鼠标释放（拖拽中按钮松开） */
      if (dragging && evt.buttons != null && (evt.buttons & 1) === 0) {
        endDrag(evt);
        updateHover(evt);
        return;
      }
      updateHover(evt);
      moveDrag(evt);
    });

    /* 鼠标移动事件 - 悬停处理（非拖拽） */
    window.addEventListener('mousemove', function(evt){
      if (!dragging) updateHover(evt);
    });

    /* 指针离开事件 */
    window.addEventListener('pointerleave', function(){
      if (dragging) {
        setPointerCapture(true);  // 拖拽中保持捕获
        return;
      }
      hideInteractionHint();
    });

    /* 鼠标离开事件 */
    window.addEventListener('mouseleave', function(){
      if (!dragging) hideInteractionHint();
    });

    /* 指针按下事件 - 开始拖拽或锁定切换 */
    window.addEventListener('pointerdown', function(evt){
      if (!pointInStage(evt)) return;
      /* 忽略关闭按钮点击 */
      if (closeLyricsBtn && closeLyricsBtn.contains(evt.target)) return;

      /* 中键点击 - 切换锁定状态 */
      if (evt.button === 1) {
        evt.preventDefault();
        hideInteractionHint();
        return;
      }

      /* 锁定状态 - 忽略左键 */
      if (isLocked()) {
        hideInteractionHint();
        setPointerCapture(false);
        return;
      }

      /* 解锁状态左键 - 开始拖拽 */
      if (evt.button === 0 && !isLocked()) {
        dragging = true;
        dragPointerId = evt.pointerId;
        dragLast.x = evt.screenX;
        dragLast.y = evt.screenY;
        setPointerCapture(true);
        try {
          if (stage.setPointerCapture) stage.setPointerCapture(evt.pointerId);
        } catch (e) {}
        evt.preventDefault();
      }
    });

    /* 指针释放和取消事件 */
    window.addEventListener('pointerup', endDrag);
    window.addEventListener('pointercancel', endDrag);

    /* 窗口失焦事件 - 结束拖拽 */
    window.addEventListener('blur', function(){
      endDrag({ pointerId:dragPointerId });
      hideInteractionHint();
    });

    /* 失去指针捕获事件 */
    stage.addEventListener('lostpointercapture', endDrag);

    /* 辅助点击事件 - 阻止中键默认行为 */
    window.addEventListener('auxclick', function(evt){
      if (evt.button === 1 && pointInStage(evt)) evt.preventDefault();
    });

    /* ==================== 关闭按钮事件 ==================== */
    if (closeLyricsBtn) {
      closeLyricsBtn.addEventListener('click', function(evt){
        evt.preventDefault();
        evt.stopPropagation();
        state.enabled = false;
        document.body.classList.remove('show');
        setPointerCapture(false);
        /* 通知桌面覆盖层关闭歌词 */
        if (window.desktopOverlay && window.desktopOverlay.closeLyrics) {
          window.desktopOverlay.closeLyrics().catch(function(){});
        }
      });
    }

    /* ==================== 消息和状态接口 ==================== */
    /* 暴露状态应用函数到全局 */
    window.__bhandsmusicDesktopLyricsApplyState = applyState;

    /* 监听状态消息 - 来自主窗口 */
    window.addEventListener('message', function(event){
      var data = event && event.data;
      if (!data || data.type !== 'bhandsmusic-desktop-lyrics-state') return;
      applyState(data.payload || {});
    });

    /* 监听窗口大小改变 */
    window.addEventListener('resize', resize);

    /* ==================== 初始化 ==================== */
    resize();  // 初始化布局

    /* 从 URL 查询参数加载初始状态 */
    (function applyQueryState(){
      try {
        var raw = new URLSearchParams(window.location.search).get('state');
        if (raw) applyState(JSON.parse(raw));
      } catch (e) {}
    })();

    /* 注册桌面覆盖层状态回调 */
    if (window.desktopOverlay && window.desktopOverlay.onLyricsState) {
      window.desktopOverlay.onLyricsState(applyState);
    }

    /* 启动绘制循环 */
    requestAnimationFrame(draw);
  </script>
</body>
</html>
