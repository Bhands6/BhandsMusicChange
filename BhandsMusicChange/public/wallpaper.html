<!--
  Mineradio 壁纸模式渲染页面
  被 Electron 主进程嵌入 Windows 桌面 WorkerW 层，实现动态壁纸效果。
  通过 desktopOverlay.onWallpaperState 接收主进程推送的状态更新。
  使用 Canvas 2D 绘制粒子动画和专辑封面模糊背景。
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Wallpaper</title>
  <style>
    /* 全屏铺满，深色背景，无滚动条 */
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050608}
    canvas{position:absolute;inset:0;width:100%;height:100%}
  </style>
</head>
<body>
  <canvas id="wall"></canvas>
  <script>
    'use strict';

    // ==================== 画布初始化 ====================
    var canvas = document.getElementById('wall');
    var ctx = canvas.getContext('2d', { alpha:false }); // 不需要 alpha 通道，提升性能
    var W = 1, H = 1, dpr = 1;

    // ==================== 壁纸状态 ====================
    // 由主进程通过 desktopOverlay.onWallpaperState 推送更新
    var state = {
      enabled:false,       // 是否启用
      title:'Mineradio',   // 当前歌曲标题
      artist:'',           // 当前歌手
      cover:'',            // 封面 URL
      playing:false,       // 是否正在播放（影响粒子速度）
      preset:0,            // 视觉预设索引
      opacity:1,           // 壁纸整体透明度
      colors:{             // 颜色配置（来自主进程的视觉主色）
        primary:'#d6f8ff',  // 主色（用于背景渐变）
        secondary:'#9cffdf',// 副色（用于粒子和光晕）
        highlight:'#fff0b8',// 高亮色（用于闪光粒子）
        glow:'#9cffdf'      // 发光色
      }
    };

    // ==================== 封面图片缓存 ====================
    var coverImg = null;   // 已加载的封面 Image 对象
    var coverSrc = '';     // 当前封面 URL（用于去重）

    // ==================== 粒子系统 ====================
    // 每个粒子有固定的 seed（用于伪随机位置计算）、归一化坐标、色相通道、深度、大小
    var particles = [];

    // ==================== 工具函数 ====================

    /**
     * 将十六进制颜色转为 RGB 对象
     * @param {string} hex - 十六进制颜色（#RGB 或 #RRGGBB）
     * @param {string} fallback - 解析失败时的默认颜色
     * @returns {{r:number, g:number, b:number}}
     */
    function hexToRgb(hex, fallback){
      hex = String(hex || fallback || '#9cffdf').trim();
      // 展开 #RGB 为 #RRGGBB
      if (/^#[0-9a-f]{3}$/i.test(hex)) hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
      if (!/^#[0-9a-f]{6}$/i.test(hex)) hex = fallback || '#9cffdf';
      return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
    }

    /**
     * 将十六进制颜色转为 rgba() CSS 字符串
     * @param {string} hex - 十六进制颜色
     * @param {number} a - 透明度（0~1）
     * @returns {string}
     */
    function rgba(hex, a){
      var c = hexToRgb(hex);
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
    }

    /**
     * 基于 seed 的伪随机数生成器（确定性，相同 seed 总是返回相同值）
     * @param {number} seed
     * @returns {number} 0~1 之间的伪随机数
     */
    function rand(seed){ return Math.abs(Math.sin(seed * 3187.917) * 43758.5453) % 1; }

    // ==================== 粒子管理 ====================

    /**
     * 确保粒子数量与屏幕面积匹配
     * 目标：420~760 个粒子，按屏幕像素面积缩放
     */
    function ensureParticles(){
      var target = Math.min(760, Math.max(420, Math.round((innerWidth * innerHeight) / 4200)));
      // 补充不足的粒子
      while (particles.length < target) {
        var i = particles.length + 1;
        particles.push({
          seed:i * 11.37,          // 伪随机种子
          x:rand(i),               // 初始角度偏移（归一化）
          y:rand(i * 2.7),         // 垂直偏移
          lane:rand(i * 5.9),      // 色彩通道分配（决定粒子颜色）
          z:rand(i * 8.1),         // 深度（0=近，1=远，影响轨道半径和大小）
          size:.6 + rand(i * 4.2) * 2.4 // 基础半径（像素）
        });
      }
      // 移除多余的粒子（留 80 的缓冲避免频繁增删）
      if (particles.length > target + 80) particles.length = target;
    }

    // ==================== 画布尺寸管理 ====================

    /** 处理窗口尺寸变化，更新画布分辨率和 DPR */
    function resize(){
      dpr = Math.min(1.35, Math.max(1, window.devicePixelRatio || 1));
      W = Math.max(1, Math.floor(innerWidth * dpr));
      H = Math.max(1, Math.floor(innerHeight * dpr));
      canvas.width = W; canvas.height = H;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ensureParticles();
    }

    // ==================== 封面加载 ====================

    /**
     * 异步加载封面图片（仅在 URL 变化时重新加载）
     * @param {string} src - 封面图片 URL
     */
    function setCover(src){
      src = String(src || '');
      if (src === coverSrc) return; // URL 未变化，跳过
      coverSrc = src;
      coverImg = null;
      if (!src) return;
      var img = new Image();
      img.onload = function(){ if (coverSrc === src) coverImg = img; };   // 防止竞态
      img.onerror = function(){ if (coverSrc === src) coverImg = null; };
      img.src = src;
    }

    // ==================== 状态更新 ====================

    /**
     * 合并主进程推送的新状态
     * @param {object} next - 新状态（部分更新）
     */
    function applyState(next){
      state = Object.assign({}, state, next || {});
      state.colors = Object.assign({}, state.colors, next && next.colors || {});
      setCover(state.cover || '');
    }

    // ==================== 封面绘制 ====================

    /**
     * 绘制专辑封面（居中、带呼吸动画、模糊背景 + 清晰前景叠加）
     * @param {number} now - 当前时间（秒）
     */
    function drawCover(now){
      if (!coverImg) return;
      // 封面尺寸：屏幕短边的 42%，带微弱呼吸缩放
      var side = Math.min(innerWidth, innerHeight) * (.42 + Math.sin(now * .21) * .012);
      var x = innerWidth * .5 - side * .5;
      var y = innerHeight * .50 - side * .5 + Math.sin(now * .37) * 8; // 垂直微浮
      ctx.save();
      // 第一层：大尺寸模糊封面（背景光晕效果）
      ctx.globalAlpha = .16 * (state.opacity || 1);
      ctx.filter = 'blur(28px) saturate(1.25)';
      ctx.drawImage(coverImg, x - side * .12, y - side * .12, side * 1.24, side * 1.24);
      // 第二层：清晰封面（半透明叠加）
      ctx.filter = 'none';
      ctx.globalAlpha = .20 * (state.opacity || 1);
      ctx.drawImage(coverImg, x, y, side, side);
      ctx.restore();
    }

    // ==================== 主渲染循环 ====================

    /**
     * 每帧绘制：背景渐变 → 封面 → 粒子动画 → 光晕
     * @param {number} nowMs - requestAnimationFrame 时间戳（毫秒）
     */
    function draw(nowMs){
      var now = nowMs * .001; // 转为秒
      ensureParticles();
      var opacity = Math.max(.35, Math.min(1, state.opacity || 1));
      var primary = state.colors.primary || '#d6f8ff';
      var secondary = state.colors.secondary || '#9cffdf';
      var highlight = state.colors.highlight || '#fff0b8';
      var glow = state.colors.glow || secondary;

      // 1) 背景渐变（深色底 + 主/副色微弱渗透）
      var bg = ctx.createLinearGradient(0,0,innerWidth,innerHeight);
      bg.addColorStop(0, '#050608');
      bg.addColorStop(.52, rgba(primary, .12 * opacity));
      bg.addColorStop(1, rgba(secondary, .10 * opacity));
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,innerWidth,innerHeight);

      // 2) 封面绘制
      drawCover(now);

      // 3) 粒子动画（additive blending 叠加发光）
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var cx = innerWidth * .5;   // 中心 X
      var cy = innerHeight * .5 + Math.sin(now * .28) * innerHeight * .018; // 中心 Y（微弱垂直漂移）
      var rx = innerWidth * .40;  // 轨道半径 X
      var ry = innerHeight * .30; // 轨道半径 Y

      for (var i=0;i<particles.length;i++) {
        var p = particles[i];
        // 旋转速度：基础 + 随机偏移 + 播放时加速
        var speed = .009 + rand(p.seed) * .021 + (state.playing ? .010 : 0);
        // 当前角度（旋转 + 微弱摆动）
        var a = (p.x * Math.PI * 2 + now * speed + Math.sin(now * .07 + p.seed) * .14) % (Math.PI * 2);
        // 轨道环半径（深度越深越靠近中心）
        var ring = .18 + p.z * .82;
        // 垂直摆动
        var wobble = Math.sin(now * (.22 + rand(p.seed) * .18) + p.seed) * 12;
        // 计算屏幕坐标（椭圆轨道 + 漂移 + 摆动）
        var x = cx + Math.cos(a) * rx * ring + Math.sin(now * .11 + p.seed) * 24;
        var y = cy + Math.sin(a * (1.0 + rand(p.seed * 2) * .16)) * ry * ring + wobble;
        // 闪烁（高频 sin 的 4 次方，产生尖锐的闪光脉冲）
        var tw = Math.pow(.5 + .5 * Math.sin(now * (.50 + rand(p.seed)*.42) + p.seed), 4);
        // 实时半径：基础 + 闪烁膨胀
        var r = Math.max(.7, p.size * (.8 + tw * 1.2));
        // 颜色选择：高亮闪 → 副色/发光色（按 lane 分配）
        var col = tw > .74 ? highlight : (p.lane > .55 ? secondary : glow);
        // 透明度：基础 + 闪烁增强 + 播放时微增
        ctx.globalAlpha = (0.045 + tw * .18 + (state.playing ? .035 : 0)) * opacity;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fill();
      }

      // 4) 中心光晕（径向渐变，营造氛围感）
      var aura = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(innerWidth,innerHeight)*.54);
      aura.addColorStop(0, rgba(highlight, .12 * opacity));
      aura.addColorStop(.34, rgba(secondary, .08 * opacity));
      aura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = .9;
      ctx.fillStyle = aura;
      ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.restore();

      // 请求下一帧
      requestAnimationFrame(draw);
    }

    // ==================== 启动 ====================
    window.addEventListener('resize', resize);
    resize();

    // 监听主进程推送的壁纸状态更新（通过 overlay-preload.js 桥接）
    if (window.desktopOverlay && window.desktopOverlay.onWallpaperState) {
      window.desktopOverlay.onWallpaperState(applyState);
    }

    // 启动渲染循环
    requestAnimationFrame(draw);
  </script>
</body>
</html>
